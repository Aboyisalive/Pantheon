version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: pantheon-backend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: http://localhost:5173
    restart: unless-stopped